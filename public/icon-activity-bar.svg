<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 6-petal data bloom — monochrome for VS Code activity bar theming -->
  <!-- VS Code uses this as a mask template, fills with theme foreground color -->
  <g transform="translate(50 50)">
    <ellipse cx="0" cy="-18" rx="7" ry="15"/>
    <g transform="rotate(60)"><ellipse cx="0" cy="-22" rx="7" ry="19"/></g>
    <g transform="rotate(120)"><ellipse cx="0" cy="-30" rx="7" ry="27"/></g>
    <g transform="rotate(180)"><ellipse cx="0" cy="-25" rx="7" ry="22"/></g>
    <g transform="rotate(240)"><ellipse cx="0" cy="-20" rx="7" ry="17"/></g>
    <g transform="rotate(300)"><ellipse cx="0" cy="-14" rx="7" ry="11"/></g>
    <circle cx="0" cy="0" r="5"/>
  </g>
</svg>
